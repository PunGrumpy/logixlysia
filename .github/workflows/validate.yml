name: 🤖 Validate

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  security:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: ./.github/workflows/security.yml

  code-quality:
    needs:
      - security
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Lint
            command: bun run lint
          - name: Format
            command: bun run format
          - name: Typecheck
            command: bun run typecheck
          - name: Test
            command: bun run test
    steps:
      - name: 🛫 Checkout Code
        uses: actions/checkout@v6
      - name: 🍞 Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: 🌵 Cache Bun
        id: bun-cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            **/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: 🔽 Install Dependencies
        run: bun install
      - name: 🔍 Run ${{ matrix.name }}
        env:
          CI: true
        run: ${{ matrix.command }}
